name: Fix Python for Android Build

on:
  workflow_dispatch: # Để mày bấm nút Run trên điện thoại

jobs:
  build_job:
    runs-on: ubuntu-20.04 # Dùng bản này cho nó lành, dễ cài Python 2 hơn
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python 2.7
        run: |
          sudo apt-get update
          sudo apt-get install -y python2
          # Ép lệnh 'python' phải là bản 2
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1
          python --version

      - name: Build LineageOS (Hoặc các lệnh tiếp theo của mày)
        run: |
          echo "Bây giờ mày có thể chạy lệnh build ở đây mà không sợ lỗi print nữa!"
          # Ví dụ: source build/envsetup.sh && lunch ...
          
